version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: React 19
  - framework: React Router 7
  - build_tool: Vite
  - realtime: Socket.IO client
routes:
  - path: /
    description: Landing page with product overview and entry points for creating or joining a game.
  - path: /create
    description: Quiz setup flow for trivia, social, and custom game creation.
  - path: /join
    description: Join form that accepts room code and player name, including deep links via ?code=.
  - path: /host/:roomCode
    description: Host room experience with lobby, live gameplay screens, leaderboard, and play again controls.
  - path: /play/:roomCode
    description: Player room experience with lobby, question answering, leaderboard, and finished state.
features:
  - name: Landing and navigation
    description: Users can enter the app from a branded landing page and navigate to create or join flows without authentication.
    user_interactions:
      - Open the landing page.
      - Click "Create Game" to go to the quiz setup flow.
      - Click "Join Game" to go to the room join flow.
    api_calls: []
  - name: Trivia generation from preset topics
    description: Hosts can generate quiz questions by choosing a preset trivia topic and question count.
    user_interactions:
      - Open /create.
      - Enter a quiz title and host name.
      - Select Trivia mode.
      - Choose a preset topic and question count.
      - Click "Generate Questions".
      - Review the generated question set before room creation.
    api_calls:
      - method: POST
        path: /api/quizzes/groq-generate
        description: Generates AI trivia questions for a selected topic and count.
  - name: Trivia generation from custom AI prompt
    description: Hosts can provide a free-form topic and request AI-generated trivia questions.
    user_interactions:
      - Open /create.
      - Select Trivia mode.
      - Switch source to AI.
      - Enter a custom topic prompt.
      - Pick a question count.
      - Click "Generate Questions".
    api_calls:
      - method: POST
        path: /api/quizzes/groq-generate
        description: Generates AI trivia questions for a custom topic prompt.
  - name: Trivia generation from uploaded file
    description: Hosts can upload a PDF, DOCX, or TXT file and generate quiz questions from its contents.
    user_interactions:
      - Open /create.
      - Select Trivia mode.
      - Switch source to File.
      - Choose a supported local file.
      - Pick a question count.
      - Click "Generate from File".
      - Review the generated questions or error message.
    api_calls:
      - method: POST
        path: /api/quizzes/from-file
        description: Uploads a file and generates questions from extracted text.
  - name: Social and custom quiz creation
    description: Hosts can create social packs like Who Knows Me Best and Hot Seat, or manually author custom questions.
    user_interactions:
      - Open /create.
      - Select a social mode or Custom mode.
      - For social mode, generate the pack questions and optionally prefill host answers.
      - For custom mode, add question text, four options, and the correct answer for each draft.
      - Review the generated or authored question set.
    api_calls:
      - method: GET
        path: /api/packs/:packId
        description: Retrieves generated social pack questions for the chosen mode.
  - name: Room creation
    description: Hosts can create a playable room after questions are ready and required metadata is filled in.
    user_interactions:
      - Complete question generation or custom question authoring.
      - Enter quiz title and host name.
      - Choose whether the host plays or spectates when applicable.
      - Click "Create Room".
      - View the generated room code and continue to the host lobby.
    api_calls:
      - method: POST
        path: /api/rooms/create
        description: Creates a room with quiz metadata, mode, host role, and question payloads.
  - name: Join by code or deep link
    description: Players can join from the join form, including when the room code is prefilled through a ?code= URL parameter.
    user_interactions:
      - Open /join or a /join?code=ROOM01 deep link.
      - Confirm or edit the room code.
      - Enter a player name.
      - Submit the form to join the room.
      - Navigate to the player room screen on success or view an inline error on failure.
    api_calls:
      - method: SOCKET
        path: room:join
        description: Requests entry into an existing room with room code and player name.
  - name: Lobby sharing and multiplayer presence
    description: Hosts can copy room codes or share links while players see live lobby updates as participants join.
    user_interactions:
      - Open the host lobby.
      - Copy the room code or the direct join link.
      - Use WhatsApp or X share links.
      - Watch the player list update as participants join.
    api_calls:
      - method: SOCKET
        path: room:updated
        description: Pushes live room state updates, including connected players and lobby status.
  - name: Real-time gameplay and answer submission
    description: Players receive live questions, answer once per round, and are auto-submitted with no answer when the timer expires.
    user_interactions:
      - Wait in the lobby for the host to start.
      - View each question and countdown timer.
      - Select an answer before time runs out.
      - Wait for the next stage after answering or timeout.
    api_calls:
      - method: SOCKET
        path: game:start
        description: Starts the quiz from the host lobby.
      - method: SOCKET
        path: question:started
        description: Pushes the next question payload to host and players.
      - method: SOCKET
        path: answer:submit
        description: Sends the selected answer index for the current question.
  - name: Leaderboard and finished state
    description: Players and hosts see leaderboard updates between rounds and a final game-over state when the quiz ends.
    user_interactions:
      - Finish or wait out a question.
      - View rank, score, and score delta updates on the leaderboard.
      - Continue through subsequent questions until the game ends.
    api_calls:
      - method: SOCKET
        path: leaderboard:updated
        description: Pushes live scoreboard updates after each question.
      - method: SOCKET
        path: game:finished
        description: Pushes the final standings when the quiz is complete.
  - name: Play again reset
    description: The host can reset a finished room to return all connected clients to the lobby for another round.
    user_interactions:
      - Finish a game in the host room.
      - Click "Play Again".
      - Observe the room return to lobby state for another run.
    api_calls:
      - method: SOCKET
        path: room:reset
        description: Resets a finished room back to the lobby state.
known_limitations:
  - Join-page room-code validation is limited to presence and uppercase formatting on the client; invalid codes are rejected only after the socket request.
  - Duplicate player-name handling is delegated to the server and surfaced as inline join errors.
  - Play Again is only exposed in the host finished screen; players rely on room updates to return to the lobby.
  - File-upload generation accepts only PDF, DOCX, and TXT files from the browser picker.
